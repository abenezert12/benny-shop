version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: benny_shop_db
    environment:
      POSTGRES_USER: benny_user
      POSTGRES_PASSWORD: benny_password
      POSTGRES_DB: benny_shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - benny_shop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benny_user -d benny_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: benny_shop_api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://benny_user:benny_password@postgres:5432/benny_shop
      JWT_SECRET: your-secret-key
      CORS_ORIGIN: http://localhost:5177
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - benny_shop_network

volumes:
  postgres_data:

networks:
  benny_shop_network:
    driver: bridge
